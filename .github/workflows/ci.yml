name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone setup-zig from Codeberg
        run: git clone https://codeberg.org/mlugg/setup-zig ./.github/actions/setup-zig

      - name: Setup Zig
        uses: ./.github/actions/setup-zig
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Run Tests
        run: zig build test

  release-please:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      - name: Tag and Release
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "Release created: ${{ steps.release.outputs.tag_name }}"
